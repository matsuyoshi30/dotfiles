gui:
  language: "en"
customCommands:
  - key: "<c-g>"
    context: "files"
    prompts:
      - type: "menu"
        title: "AI Commit Message"
        options:
          - name: "Generate with Claude"
            value: "claude"
    command: >-
      bash -c 'MSG=$(git diff --cached | claude -p "Generate ONLY a one-line Git commit message following Conventional Commits format. No explanation, no quotes, just the message in comprehensive English." 2>/dev/null) && git commit -e -m "$MSG"'
    loadingText: "Generating commit message..."
    output: terminal
