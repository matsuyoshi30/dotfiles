presets:
  base:
    allow:
      - "."
      - "$HOME/.cache"
      - "$HOME/.local/share"
      - "/private/tmp"
      - "/var/folders"
      - "/Library/Caches"
      - "$HOME/Library/Caches"
  git-enabled:
    allow-git: true
    allow-keychain: true
  claude-code:
    allow:
      - "$HOME/.claude"
  gradle:
    allow:
      - "$HOME/.gradle"
  npm:
    allow:
      - "$HOME/.npm"
auto-presets:
  - command: claude
    presets:
      - base
      - git-enabled
      - claude-code
      - gradle
      - npm
